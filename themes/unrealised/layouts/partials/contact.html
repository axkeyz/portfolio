<div class="m-12 grid grid-cols-1 md:grid-cols-5 md:m-24">
    <div class="md:col-start-2 md:col-span-3">
        <h2 class="text-2xl font-bold text-center">Not enough? Get in touch!</h2><br/>
        <form name="contact" method="POST" data-netlify="true">
            <label for="name" class="text-sm">Name</label>
            <input type="text" class="w-full p-3 rounded border border-green-500 focus:ring-2 focus:ring-green-500" name="name" />
            <label for="email" class="text-sm">Email</label>
            <input type="email" class="w-full p-3 rounded border border-green-500 focus:ring-2 focus:ring-green-500" name="email" />
            <label for="message" class="text-sm">Message</label>
            <textarea name="message" class="w-full p-3 rounded border border-green-500 focus:ring-2 focus:ring-green-500" rows="5"></textarea>
            <button type="submit" class="w-full mt-3 bg-green-500 text-white font-bold text-sm py-2 px-4 rounded hover:bg-green-600">Send</button>
        </form>
    </div>     
</div>

{{ define "main" }}
{{- partial "header.html" . -}}
<div id="content" class="px-8 md:px-20">
<!-- Shows all of the site's tags -->
<h1>Tags</h1>
<ul>
    {{ range .Data.Terms.Alphabetical }}
        <li><a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a> {{ .Count }}</li>
    {{ end }}
</ul>

<div class="page-footer"></div>

</div>
{{- partial "footer.html" . -}}
{{end}}

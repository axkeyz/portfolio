<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="description" content="Aileen Huang's online dump of coding projects from web to game and other musings.">
    <meta name="keywords" content="aileen huang, portfolio, coding, programmer, engineer, game">
    <meta name="author" content="Aileen Huang">

    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16x16.png" | relURL }}">
    <link rel="manifest" href="{{ "manifest.json" | relURL }}">
    <link rel="mask-icon" href="{{ "safari-pinned-tab.svg" | relURL }}" color="#FF3DB4">
    <meta name="theme-color" content="#ffffff">

    <!-- Styles -->
    <link rel="preload" href="/css/main.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="/css/main.min.css">
    </noscript>

    <link rel="preload" href="/fonts/NotoSans-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/NotoSerif-SemiBold.woff2" as="font" type="font/woff2" crossorigin>

    <style>
      @font-face{font-family:Noto Sans;src:url(/fonts/NotoSans-Regular.woff2)format("woff2"),url(/fonts/NotoSans-Regular.woff)format("woff");font-weight:400;font-display:fallback}@font-face{font-family:Noto Serif;src:url(/fonts/NotoSerif-SemiBold.woff2)format("woff2"),url(/fonts/NotoSerif-SemiBold.woff)format("woff");font-weight:600;font-display:fallback}html{line-height:1.15;-webkit-text-size-adjust:100%}body{margin:0}a{background-color:transparent}::-webkit-file-upload-button{-webkit-appearance:button;font:inherit}html,body{height:100%;width:100%;overflow-x:hidden}html{margin:0;line-height:170%;-ms-overflow-style:-ms-autohiding-scrollbar}body{color:#5f5f5f;font-family:noto sans,segoe ui,helvetica neue,Helvetica,Roboto,FreeSans,sans-serif;margin:0;font-size:1.1rem}h2{margin:1.25em 0 .75em;font-family:noto serif,segoe ui,helvetica neue,Helvetica,Roboto,FreeSans,serif;font-weight:600}h2{font-size:1.25em;line-height:1.4em}h2 a,h2 a:visited{color:#000;text-decoration:none;position:relative;text-shadow:0 -2px 0 #fff,0 -1px 0 #fff,0 0 0 #fff,2px -2px 0 #fff,2px -1px 0 #fff,2px 0 0 #fff,-2px -2px 0 #fff,-2px -1px 0 #fff,-2px 0 0 #fff,1px -2px 0 #fff,1px -1px 0 #fff,1px 0 0 #fff,-1px -2px 0 #fff,-1px -1px 0 #fff,-1px 0 0 #fff,0 -2px 0 #fff,0 -1px 0 #fff,0 0 0 #fff;box-shadow:0 -1px 0 0 #fff inset,0 -2px 0 0 transparent inset;background-size:1px 1em;position:relative}p{margin:0 0 1em}a{text-decoration:none;color:#5f5f5f}time{margin-right:1.5em;color:#707070}nav{padding:.25em 1.5em 1em;max-width:100%}.site-title{margin:1.5em 0 1em;text-align:center;line-height:1.7em}.site-title a{font-family:noto serif,segoe ui,helvetica neue,Helvetica,Roboto,FreeSans,serif;font-size:1.5em;text-decoration:none;margin-top:.75em}.nav-menu{display:flex;flex-direction:row;justify-content:center;flex-wrap:wrap}.content-container{padding:.5em 1.5em 0;margin:0;max-width:100%}.paginator{flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-end;margin-top:1em;padding-bottom:1.5em;align-items:center}.article-content{flex:1 0 auto}.post-footer{font-size:.95rem;color:#707070;border-bottom:1px solid #d2d2d2;padding-bottom:1.8em}.footer{visibility:hidden;height:0}footer{text-align:center}footer .social-icons{margin:0 0 1.25em -.5em}footer .social-icon{padding:.3em .5em;margin:.32em .1em;display:inline-block;height:2em;position:relative}footer a{text-decoration:none;font-size:.95rem;color:#707070}@media only screen and (min-width:900px){nav{position:fixed;overflow:auto;height:100%;top:0;left:36px;width:240px;padding:0}.site-title{margin:3em 0 1em;text-align:left}.nav-menu{display:flex;flex-direction:column;align-items:flex-start}.article-content{margin-top:1.4em}.paginator{padding-bottom:2em}.content-container{max-width:680px;margin-left:310px;padding:0 1.5em 0 0;height:100%;display:flex;flex-direction:column}.footer{position:relative;visibility:visible;margin-top:1em;text-align:left}.social-icons{width:100%}}a:hover{color:#3ca645}
    </style>

    <!-- Uncomment to add custom styles -->
    <!-- Modify the custom.scss file inside assets > css to use scss -->
    <!-- {{ $custom_style := resources.Get "css/custom.scss" | toCSS | minify | fingerprint }} 
    <link rel="stylesheet" href="{{ $custom_style.Permalink }}"/> -->

    <!-- Modify the custom.css file inside static > css to use vanilla css -->
    <!-- <link type="text/css" rel="stylesheet" href="{{ "/" | relURL }}css/custom.css"> -->
 
    {{ with .OutputFormats.Get "RSS" }}
    {{ printf `<link rel="%s" type="%s" href="%s" title="%s" />` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
    {{ end }}
    {{- if not .Site.IsServer -}}
      {{ template "_internal/google_analytics.html" . }}
    {{- end -}}
</head>
